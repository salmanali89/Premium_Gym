<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gym — North Karachi · POS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<style>
/* ══════════════════════════════════════════════════
   DESIGN TOKENS — Premium Grey · Black · Orange
══════════════════════════════════════════════════ */
:root {
  --bg:        #0c0c0e;
  --surface:   #131318;
  --surface2:  #1b1b22;
  --surface3:  #22222b;
  --border:    #2e2e3a;
  --border2:   #3a3a48;
  --accent:    #f97316;
  --text:      #eeeef5;
  --text2:     #b0b0c0;
  --muted:     #666678;
  --red:       #ef4444;
  --green:     #22c55e;
  --blue:      #3b82f6;
  --radius:    14px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 36px; border-bottom: 1px solid var(--border);
  background: rgba(12,12,14,0.94); position: sticky; top: 0; z-index: 200;
}
.logo-text { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:19px; text-transform:uppercase; }
.logo-text span { color:var(--accent); }

main { padding:32px 36px; max-width:1380px; margin:0 auto; }

.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:36px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; text-align:center; }
.stat-num { font-family:'Barlow Condensed',sans-serif; font-size:42px; font-weight:900; color:var(--accent); }

.bottom-grid { display:grid; grid-template-columns:1fr 380px; gap:22px; }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }

input, select { 
  background:var(--surface2); border:1px solid var(--border); color:white; 
  padding:10px; border-radius:8px; width:100%; margin-bottom:10px; outline:none;
}
.submit-btn { 
  background:var(--accent); color:white; font-weight:bold; padding:12px; 
  border-radius:8px; width:100%; cursor:pointer; border:none; text-transform:uppercase;
}

table { width:100%; border-collapse:collapse; margin-top:15px; }
th { text-align:left; color:var(--muted); font-size:12px; padding:10px; border-bottom:1px solid var(--border); }
td { padding:12px 10px; border-bottom:1px solid rgba(255,255,255,0.05); }

.pill-active { color:var(--green); font-weight:bold; }
.btn-del { color:var(--red); cursor:pointer; font-weight:bold; }
</style>
</head>
<body>

<header>
  <div class="logo-text">Premium <span>Gym</span></div>
  <div id="syncStatus" style="font-size:10px; color:var(--green)">● CLOUD SYNC ACTIVE</div>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div style="color:var(--muted)">Total Members</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statActive" style="color:var(--green)">0</div>
      <div style="color:var(--muted)">Active</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statRevenue">0</div>
      <div style="color:var(--muted)">Revenue (Rs)</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statExpenses" style="color:var(--red)">0</div>
      <div style="color:var(--muted)">Expenses</div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="panel">
      <h3>Member Directory</h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Package</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="memberTableBody"></tbody>
      </table>
    </div>

    <div class="panel">
      <h3 style="color:var(--accent); margin-bottom:15px;">Enroll New Member</h3>
      <input type="text" id="memberName" placeholder="Full Name">
      <input type="text" id="memberPhone" placeholder="Phone Number">
      <select id="memberPackage">
        <option value="Basic">Basic Package (Rs. 2500)</option>
        <option value="PT">Personal Training (Rs. 8000)</option>
      </select>
      <button class="submit-btn" onclick="addMember()">Add to Cloud</button>

      <hr style="margin:20px 0; border:0; border-top:1px solid var(--border);">
      
      <h3 style="color:var(--red); margin-bottom:15px;">Add Expense</h3>
      <input type="text" id="expLabel" placeholder="Electricity, Rent, etc.">
      <input type="number" id="expAmount" placeholder="Amount in Rs.">
      <button class="submit-btn" style="background:var(--red)" onclick="addExpense()">Add Expense</button>
    </div>
  </div>
</main>

<script>
// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyCJac3HBkDaCACXHyXIz4D5U_HSSR67xvs",
  authDomain: "premium-gym-nk.firebaseapp.com",
  databaseURL: "https://premium-gym-nk-default-rtdb.firebaseio.com",
  projectId: "premium-gym-nk",
  storageBucket: "premium-gym-nk.firebasestorage.app",
  messagingSenderId: "450647905128",
  appId: "1:450647905128:web:fa59f3b0d3035ae00bfcdd"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADD MEMBER
function addMember() {
  const name = document.getElementById('memberName').value;
  const phone = document.getElementById('memberPhone').value;
  const pkg = document.getElementById('memberPackage').value;
  const price = (pkg === 'Basic') ? 2500 : 8000;

  if(name && phone) {
    db.ref('members').push({
      name, phone, pkg, price,
      status: 'Active',
      date: new Date().toLocaleDateString()
    });
    document.getElementById('memberName').value = '';
    document.getElementById('memberPhone').value = '';
  }
}

// ADD EXPENSE
function addExpense() {
  const label = document.getElementById('expLabel').value;
  const amount = document.getElementById('expAmount').value;
  if(label && amount) {
    db.ref('expenses').push({
      label, amount: parseInt(amount),
      date: new Date().toLocaleDateString()
    });
    document.getElementById('expLabel').value = '';
    document.getElementById('expAmount').value = '';
  }
}

// DELETE ITEM
function deleteItem(path, id) {
  if(confirm('Delete kar dein?')) {
    db.ref(path + '/' + id).remove();
  }
}

// REAL-TIME SYNC DATA
db.ref().on('value', (snapshot) => {
  const data = snapshot.val() || {};
  const members = data.members || {};
  const expenses = data.expenses || {};

  // Update Table
  const tbody = document.getElementById('memberTableBody');
  tbody.innerHTML = '';
  let totalRev = 0;
  let totalExp = 0;
  let memberCount = 0;

  Object.keys(members).forEach(id => {
    const m = members[id];
    totalRev += m.price;
    memberCount++;
    tbody.innerHTML += `
      <tr>
        <td><b>${m.name}</b></td>
        <td>${m.phone}</td>
        <td>${m.pkg}</td>
        <td class="pill-active">${m.status}</td>
        <td class="btn-del" onclick="deleteItem('members', '${id}')">DELETE</td>
      </tr>
    `;
  });

  Object.keys(expenses).forEach(id => {
    totalExp += expenses[id].amount;
  });

  // Update Stats
  document.getElementById('statTotal').innerText = memberCount;
  document.getElementById('statActive').innerText = memberCount;
  document.getElementById('statRevenue').innerText = totalRev.toLocaleString();
  document.getElementById('statExpenses').innerText = totalExp.toLocaleString();
});
</script>
</body>
</html>
