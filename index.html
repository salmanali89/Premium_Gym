<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gym — North Karachi · POS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<style>
:root { --bg: #0c0c0e; --surface: #131318; --surface2: #1b1b22; --border: #2e2e3a; --accent: #f97316; --text: #eeeef5; --muted: #666678; --red: #ef4444; --green: #22c55e; --blue: #3b82f6; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin:0; }
header { display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; border-bottom: 1px solid var(--border); background: #0c0c0e; position: sticky; top: 0; z-index: 100; }
.logo { font-family:'Barlow Condensed'; font-weight:900; font-size:22px; text-transform:uppercase; color:white; }
.logo span { color:var(--accent); }
main { padding:25px; max-width:1400px; margin:0 auto; }
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-bottom:25px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
.stat-num { font-family:'Barlow Condensed'; font-size:35px; font-weight:900; color:var(--accent); }
.layout { display:grid; grid-template-columns: 1fr 350px; gap:20px; }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
input, select { background:var(--surface2); border:1px solid var(--border); color:white; padding:10px; border-radius:6px; width:100%; margin-bottom:10px; }
.btn { background:var(--accent); color:white; font-weight:bold; padding:12px; border:none; border-radius:6px; width:100%; cursor:pointer; text-transform:uppercase; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; color:var(--muted); font-size:11px; padding:10px; border-bottom:1px solid var(--border); }
td { padding:12px 10px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px; }
.pill { padding:3px 8px; border-radius:4px; font-size:10px; font-weight:bold; border:1px solid; }
.pill-green { color:var(--green); background:rgba(34,197,94,0.1); }
</style>
</head>
<body>

<header>
  <div class="logo">Premium <span>Gym</span></div>
  <div style="color:var(--green); font-size:12px;">● CLOUD SYNC ACTIVE</div>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card">
      <div style="font-size:11px; color:var(--muted)">TOTAL MEMBERS</div>
      <div class="stat-num" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div style="font-size:11px; color:var(--muted)">REVENUE</div>
      <div class="stat-num" id="statRev">0</div>
    </div>
    <div class="stat-card">
      <div style="font-size:11px; color:var(--muted)">EXPENSES</div>
      <div class="stat-num" id="statExp" style="color:var(--red)">0</div>
    </div>
    <div class="stat-card">
      <div style="font-size:11px; color:var(--muted)">NET PROFIT</div>
      <div class="stat-num" id="statProfit" style="color:var(--blue)">0</div>
    </div>
  </div>

  <div class="layout">
    <div>
      <div class="panel">
        <h3 style="margin-bottom:15px; font-family:Barlow Condensed">MEMBER DIRECTORY</h3>
        <table>
          <thead><tr><th>Name</th><th>Package</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="mTable"></tbody>
        </table>
      </div>
      <div class="panel">
        <h3 style="margin-bottom:15px; font-family:Barlow Condensed">EXPENSE LOG</h3>
        <div id="eList"></div>
      </div>
    </div>

    <div>
      <div class="panel" style="border-top:3px solid var(--accent)">
        <h3 style="margin-bottom:10px; color:var(--accent)">ENROLL MEMBER</h3>
        <input id="n" placeholder="Name">
        <input id="p" placeholder="WhatsApp (923...)">
        <select id="pkg"><option value="Basic|2500">Basic (2500)</option><option value="PT|8000">PT (8000)</option></select>
        <button class="btn" onclick="addM()">Enroll & Print</button>
      </div>
      <div class="panel" style="border-top:3px solid var(--red)">
        <h3 style="margin-bottom:10px; color:var(--red)">ADD EXPENSE</h3>
        <input id="el" placeholder="Rent, Bill, etc.">
        <input id="ea" type="number" placeholder="Amount">
        <button class="btn" style="background:var(--red)" onclick="addE()">Save Expense</button>
      </div>
    </div>
  </div>
</main>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCJac3HBkDaCACXHyXIz4D5U_HSSR67xvs",
  authDomain: "premium-gym-nk.firebaseapp.com",
  databaseURL: "https://premium-gym-nk-default-rtdb.firebaseio.com",
  projectId: "premium-gym-nk",
  storageBucket: "premium-gym-nk.firebasestorage.app",
  messagingSenderId: "450647905128",
  appId: "1:450647905128:web:fa59f3b0d3035ae00bfcdd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function addM() {
  const name=document.getElementById('n').value, ph=document.getElementById('p').value, pk=document.getElementById('pkg').value.split('|');
  if(name&&ph){
    db.ref('members').push({name, ph, pkg:pk[0], price:parseInt(pk[1]), date:new Date().toLocaleDateString()});
    window.print();
    document.getElementById('n').value=''; document.getElementById('p').value='';
  }
}
function addE() {
  const l=document.getElementById('el').value, a=parseInt(document.getElementById('ea').value);
  if(l&&a){ db.ref('expenses').push({l, a}); document.getElementById('el').value=''; document.getElementById('ea').value=''; }
}
function del(path, id) { if(confirm('Delete?')) db.ref(path+'/'+id).remove(); }

db.ref().on('value', (snap) => {
  const data = snap.val()||{}, mems = data.members||{}, exps = data.expenses||{};
  let r=0, e=0, c=0;
  const mt=document.getElementById('mTable'); mt.innerHTML='';
  Object.keys(mems).forEach(id => {
    const m=mems[id]; r+=m.price; c++;
    mt.innerHTML += `<tr><td><b>${m.name}</b><br><small>${m.ph}</small></td><td>${m.pkg}</td><td>${m.date}</td><td><span class="pill pill-green">PAID</span></td><td><span onclick="window.open('https://wa.me/${m.ph}')">💬</span> <span onclick="del('members','${id}')">🗑️</span></td></tr>`;
  });
  const el=document.getElementById('eList'); el.innerHTML='';
  Object.keys(exps).forEach(id => {
    e+=exps[id].a;
    el.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; background:var(--surface2); margin-bottom:5px; border-radius:5px"><span>${exps[id].l}</span><span>Rs. ${exps[id].a} <b onclick="del('expenses','${id}')" style="color:var(--red); cursor:pointer">X</b></span></div>`;
  });
  document.getElementById('statTotal').innerText=c;
  document.getElementById('statRev').innerText="Rs. "+r;
  document.getElementById('statExp').innerText="Rs. "+e;
  document.getElementById('statProfit').innerText="Rs. "+(r-e);
});
</script>
</body>
</html>
