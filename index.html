<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gym — North Karachi · POS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<style>
/* ══════════════════════════════════════════════════
   DESIGN TOKENS (Vahi purane tokens jo aapne diye thay)
══════════════════════════════════════════════════ */
:root {
  --bg: #0c0c0e; --surface: #131318; --surface2: #1b1b22; --border: #2e2e3a;
  --accent: #f97316; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
  --text: #eeeef5; --muted: #666678; --radius: 14px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* Header & Layout */
header { display: flex; align-items: center; justify-content: space-between; padding: 16px 36px; border-bottom: 1px solid var(--border); background: rgba(12,12,14,0.94); position: sticky; top: 0; z-index: 200; }
.logo-text { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:19px; text-transform:uppercase; }
.logo-text span { color:var(--accent); }
main { padding:32px 36px; max-width:1400px; margin:0 auto; }

/* Stats */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:36px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; text-align:center; position:relative; }
.stat-num { font-family:'Barlow Condensed',sans-serif; font-size:42px; font-weight:900; color:var(--accent); }

/* Panels & Tables */
.bottom-grid { display:grid; grid-template-columns:1fr 380px; gap:22px; }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; padding:12px 18px; font-size:11px; color:var(--muted); text-transform:uppercase; background:var(--surface2); }
td { padding:14px 18px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13.5px; }

/* Buttons & Inputs */
input, select { background:var(--surface2); border:1px solid var(--border); color:white; padding:10px; border-radius:8px; width:100%; margin-bottom:10px; outline:none; }
.submit-btn { background:var(--accent); color:white; font-weight:bold; padding:12px; border-radius:8px; width:100%; cursor:pointer; border:none; text-transform:uppercase; }

/* Action Icons */
.action-cell { display:flex; gap:8px; }
.icon-btn { cursor:pointer; font-size:16px; transition:0.2s; opacity:0.8; }
.icon-btn:hover { transform:scale(1.2); opacity:1; }

/* Modal Design */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; place-items:center; z-index:1000; }
.modal { background:var(--surface); padding:30px; border-radius:18px; text-align:center; width:350px; border:1px solid var(--border); }
.modal-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
</style>
</head>
<body>

<header>
  <div class="logo-text">Premium <span>Gym</span></div>
  <div style="color:var(--green); font-size:12px">● CLOUD SYNC ACTIVE</div>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div style="color:var(--muted); font-size:12px">TOTAL MEMBERS</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statActive" style="color:var(--green)">0</div>
      <div style="color:var(--muted); font-size:12px">ACTIVE</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statRev" style="color:var(--blue)">0</div>
      <div style="color:var(--muted); font-size:12px">REVENUE</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statProfit">0</div>
      <div style="color:var(--muted); font-size:12px">NET PROFIT</div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="panel">
      <div style="padding:20px; font-weight:bold; border-bottom:1px solid var(--border)">MEMBER DIRECTORY</div>
      <table>
        <thead>
          <tr>
            <th>Member</th>
            <th>Package</th>
            <th>Joined</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="memberTableBody"></tbody>
      </table>
    </div>

    <div class="right-col">
      <div class="panel" style="padding:20px; border-top:3px solid var(--accent)">
        <h3 style="color:var(--accent); margin-bottom:15px">ENROLL MEMBER</h3>
        <input type="text" id="mName" placeholder="Full Name">
        <input type="text" id="mPhone" placeholder="WhatsApp Number">
        <select id="mPkg">
          <option value="Basic|2500">Basic (Rs. 2500)</option>
          <option value="PT|8000">Personal Training (Rs. 8000)</option>
        </select>
        <button class="submit-btn" onclick="addMember()">Enroll & Print</button>
      </div>
    </div>
  </div>
</main>

<div id="deleteModal" class="modal-overlay">
  <div class="modal">
    <div style="font-size:40px">🗑️</div>
    <h3 style="margin:10px 0">Delete Member?</h3>
    <p style="color:var(--muted); font-size:14px">Kya aap waqai is member ka record khatam karna chahte hain?</p>
    <div class="modal-btns">
      <button onclick="closeModal()" style="background:var(--surface2); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer">Cancel</button>
      <button id="confirmDelBtn" style="background:var(--red); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer">Delete</button>
    </div>
  </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCJac3HBkDaCACXHyXIz4D5U_HSSR67xvs",
  authDomain: "premium-gym-nk.firebaseapp.com",
  databaseURL: "https://premium-gym-nk-default-rtdb.firebaseio.com",
  projectId: "premium-gym-nk",
  storageBucket: "premium-gym-nk.firebasestorage.app",
  messagingSenderId: "450647905128",
  appId: "1:450647905128:web:fa59f3b0d3035ae00bfcdd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let deleteId = null;

// Add Member
function addMember() {
  const name = document.getElementById('mName').value;
  const phone = document.getElementById('mPhone').value;
  const pkgData = document.getElementById('mPkg').value.split('|');
  
  if(name && phone) {
    db.ref('members').push({
      name, phone, 
      pkg: pkgData[0], 
      price: parseInt(pkgData[1]),
      date: new Date().toLocaleDateString()
    });
    document.getElementById('mName').value = '';
    document.getElementById('mPhone').value = '';
    alert("Member Added!");
  }
}

// Open Delete Modal
function openDeleteModal(id) {
  deleteId = id;
  document.getElementById('deleteModal').style.display = 'grid';
}

function closeModal() {
  document.getElementById('deleteModal').style.display = 'none';
}

// Real Delete Logic
document.getElementById('confirmDelBtn').onclick = function() {
  if(deleteId) {
    db.ref('members/' + deleteId).remove()
      .then(() => {
        closeModal();
        console.log("Deleted successfully");
      });
  }
};

// Sync Data
db.ref('members').on('value', (snapshot) => {
  const data = snapshot.val();
  const tbody = document.getElementById('memberTableBody');
  tbody.innerHTML = '';
  let count = 0, rev = 0;

  if(data) {
    Object.keys(data).forEach(id => {
      const m = data[id];
      count++; rev += m.price;
      tbody.innerHTML += `
        <tr>
          <td><b>${m.name}</b><br><small style="color:var(--muted)">${m.phone}</small></td>
          <td>${m.pkg}</td>
          <td>${m.date}</td>
          <td style="color:var(--green)">Active</td>
          <td class="action-cell">
            <span class="icon-btn" onclick="window.open('https://wa.me/${m.phone}')">💬</span>
            <span class="icon-btn" onclick="openDeleteModal('${id}')" style="color:var(--red)">🗑️</span>
          </td>
        </tr>
      `;
    });
  }
  document.getElementById('statTotal').innerText = count;
  document.getElementById('statActive').innerText = count;
  document.getElementById('statRev').innerText = "Rs. " + rev;
  document.getElementById('statProfit').innerText = "Rs. " + rev;
});
</script>
</body>
</html>
