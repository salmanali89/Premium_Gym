<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Gym — North Karachi · POS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<style>
:root {
  --bg: #0c0c0e; --surface: #131318; --surface2: #1b1b22; --border: #2e2e3a;
  --accent: #f97316; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
  --text: #eeeef5; --muted: #666678; --radius: 14px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

header { display: flex; align-items: center; justify-content: space-between; padding: 16px 36px; border-bottom: 1px solid var(--border); background: rgba(12,12,14,0.94); position: sticky; top: 0; z-index: 200; }
.logo-text { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:19px; text-transform:uppercase; }
.logo-text span { color:var(--accent); }

main { padding:32px 36px; max-width:1400px; margin:0 auto; }

/* Dashboard Cards */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:30px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; text-align:center; }
.stat-num { font-family:'Barlow Condensed',sans-serif; font-size:40px; font-weight:900; color:var(--accent); }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; font-weight:bold; }

.main-grid { display:grid; grid-template-columns: 1fr 380px; gap:22px; }
.panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:20px; }
.panel-header { padding:15px; background:var(--surface2); font-weight:bold; font-size:14px; display:flex; justify-content:space-between; }

/* Table */
table { width:100%; border-collapse:collapse; }
th { text-align:left; padding:12px; font-size:11px; color:var(--muted); text-transform:uppercase; border-bottom:1px solid var(--border); }
td { padding:12px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px; }

/* Forms */
.form-body { padding:20px; }
input, select { background:var(--surface2); border:1px solid var(--border); color:white; padding:10px; border-radius:8px; width:100%; margin-bottom:12px; outline:none; }
.btn { background:var(--accent); color:white; font-weight:bold; padding:12px; border-radius:8px; width:100%; cursor:pointer; border:none; text-transform:uppercase; }
.btn-red { background:var(--red); }

/* Icons */
.action-btn { cursor:pointer; font-size:18px; margin-right:10px; transition:0.2s; display:inline-block; }
.action-btn:hover { transform:scale(1.2); }
</style>
</head>
<body>

<header>
  <div class="logo-text">Premium <span>Gym</span></div>
  <div style="color:var(--green); font-size:12px">● CLOUD SYNC ACTIVE</div>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Members</div></div>
    <div class="stat-card"><div class="stat-num" id="statRev" style="color:var(--green)">0</div><div class="stat-label">Total Revenue</div></div>
    <div class="stat-card"><div class="stat-num" id="statExp" style="color:var(--red)">0</div><div class="stat-label">Total Expenses</div></div>
    <div class="stat-card"><div class="stat-num" id="statProfit" style="color:var(--blue)">0</div><div class="stat-label">Net Profit</div></div>
  </div>

  <div class="main-grid">
    <div>
      <div class="panel">
        <div class="panel-header">MEMBER DIRECTORY</div>
        <table>
          <thead><tr><th>Name</th><th>Package</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="mTableBody"></tbody>
        </table>
      </div>

      <div class="panel">
        <div class="panel-header">MONTHLY EXPENSES LIST</div>
        <table>
          <thead><tr><th>Expense Detail</th><th>Amount</th><th>Action</th></tr></thead>
          <tbody id="eTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="right-col">
      <div class="panel" style="border-top:4px solid var(--accent)">
        <div class="panel-header" style="color:var(--accent)">ENROLL MEMBER</div>
        <div class="form-body">
          <input type="text" id="mName" placeholder="Full Name">
          <input type="text" id="mPhone" placeholder="WhatsApp Number">
          <select id="mPkg">
            <option value="Basic|2500">Basic (2500)</option>
            <option value="PT|8000">Personal Training (8000)</option>
          </select>
          <button class="btn" onclick="addM()">Save Member</button>
        </div>
      </div>

      <div class="panel" style="border-top:4px solid var(--red)">
        <div class="panel-header" style="color:var(--red)">ADD NEW EXPENSE</div>
        <div class="form-body">
          <input type="text" id="eName" placeholder="e.g. Electricity, Rent">
          <input type="number" id="eAmt" placeholder="Amount (Rs.)">
          <button class="btn btn-red" onclick="addE()">Save Expense</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCJac3HBkDaCACXHyXIz4D5U_HSSR67xvs",
  authDomain: "premium-gym-nk.firebaseapp.com",
  databaseURL: "https://premium-gym-nk-default-rtdb.firebaseio.com",
  projectId: "premium-gym-nk",
  storageBucket: "premium-gym-nk.firebasestorage.app",
  messagingSenderId: "450647905128",
  appId: "1:450647905128:web:fa59f3b0d3035ae00bfcdd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Functions
function addM() {
  const n = document.getElementById('mName').value, p = document.getElementById('mPhone').value, pkg = document.getElementById('mPkg').value.split('|');
  if(n && p) {
    db.ref('members').push({ name: n, phone: p, pkg: pkg[0], price: parseInt(pkg[1]), date: new Date().toLocaleDateString() });
    document.getElementById('mName').value = ''; document.getElementById('mPhone').value = '';
  }
}

function addE() {
  const n = document.getElementById('eName').value, a = document.getElementById('eAmt').value;
  if(n && a) {
    db.ref('expenses').push({ name: n, amount: parseInt(a) });
    document.getElementById('eName').value = ''; document.getElementById('eAmt').value = '';
  }
}

function del(path, id) { if(confirm("Delete this?")) db.ref(path + '/' + id).remove(); }

// Sync Data
db.ref().on('value', (snap) => {
  const data = snap.val() || {};
  const mems = data.members || {}, exps = data.expenses || {};
  let totalR = 0, totalE = 0, totalM = 0;

  // Render Members
  const mt = document.getElementById('mTableBody'); mt.innerHTML = '';
  Object.keys(mems).forEach(id => {
    const m = mems[id]; totalR += m.price; totalM++;
    mt.innerHTML += `<tr><td><b>${m.name}</b><br><small>${m.phone}</small></td><td>${m.pkg}</td><td>${m.date}</td>
      <td><span class="action-btn" onclick="window.open('https://wa.me/${m.phone}')">💬</span>
      <span class="action-btn" onclick="del('members','${id}')" style="color:var(--red)">🗑️</span></td></tr>`;
  });

  // Render Expenses
  const et = document.getElementById('eTableBody'); et.innerHTML = '';
  Object.keys(exps).forEach(id => {
    const e = exps[id]; totalE += e.amount;
    et.innerHTML += `<tr><td>${e.name}</td><td>Rs. ${e.amount}</td>
      <td><span class="action-btn" onclick="del('expenses','${id}')" style="color:var(--red)">🗑️</span></td></tr>`;
  });

  // Update Stats
  document.getElementById('statTotal').innerText = totalM;
  document.getElementById('statRev').innerText = "Rs. " + totalR;
  document.getElementById('statExp').innerText = "Rs. " + totalE;
  document.getElementById('statProfit').innerText = "Rs. " + (totalR - totalE);
});
</script>
</body>
</html>
